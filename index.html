<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어울림 링크허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-hover: #f4f6f9;
      --border: #e2e6ed;
      --text: #1c2230;
      --text-muted: #5c667a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --radius: 12px;
      --shadow: 0 4px 22px rgba(28, 34, 48, 0.08);
      --fab-size: 56px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding-bottom: calc(var(--fab-size) + 48px);
    }

    .app-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(28, 34, 48, 0.04);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .app-title {
      font-size: 1.15rem;
      font-weight: 700;
      flex: 1;
      min-width: 140px;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: var(--surface-hover);
      border-color: var(--text-muted);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-danger {
      background: transparent;
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(220, 38, 38, 0.08);
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 10px;
      margin-top: 24px;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .sortable-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 8px;
    }

    .card {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.15s;
    }

    .card.sortable-drag,
    .card.sortable-chosen {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
      z-index: 10;
    }

    .sortable-ghost {
      opacity: 0.35;
    }

    .card-main {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      min-width: 0;
    }

    .card-main:hover {
      background: rgba(0, 0, 0, 0.03);
    }

    .card-checkbox-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 12px;
      flex-shrink: 0;
      width: 0;
      opacity: 0;
      overflow: hidden;
      transition: width 0.28s ease, opacity 0.22s ease;
    }

    body.edit-mode .card-checkbox-wrap {
      width: 44px;
      opacity: 1;
    }

    .circle-check {
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }

    .circle-check:checked {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: inset 0 0 0 3px #ffffff;
    }

    .card-icon {
      font-size: 1.75rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-body {
      min-width: 0;
      flex: 1;
    }

    .card-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 2px;
      word-break: break-word;
    }

    .card-pin {
      flex-shrink: 0;
      padding: 8px 12px;
      border: none;
      border-left: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      transition: background 0.15s;
    }

    .card-pin:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .card-pin.pinned-active {
      filter: none;
      opacity: 1;
    }

    .card-pin:not(.pinned-active) {
      opacity: 0.45;
    }

    .fab-add {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: auto;
      min-width: var(--fab-size);
      height: var(--fab-size);
      padding: 0 18px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #ffffff;
      font-size: 1.75rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
    }

    .fab-add:hover {
      transform: scale(1.06);
      background: var(--accent-hover);
    }

    .fab-add .fab-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0 4px;
    }

    .fab-add .fab-inner .fab-plus {
      font-size: 1.35rem;
      line-height: 1;
      margin-top: -1px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28, 34, 48, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      transform: translateY(12px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 1.05rem;
    }

    .modal-body {
      padding: 18px 20px;
    }

    .modal-footer {
      padding: 14px 20px 18px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field input[type="text"],
    .field input[type="password"],
    .field input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .emoji-btn {
      aspect-ratio: 1;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-size: 1.35rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .emoji-btn:hover {
      border-color: var(--text-muted);
    }

    .emoji-btn.selected {
      border-color: var(--accent);
      background: rgba(37, 99, 235, 0.1);
    }

    .toast-container {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      width: calc(100% - 32px);
      max-width: 400px;
    }

    .toast {
      pointer-events: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      animation: toastIn 0.28s ease;
    }

    .toast.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }

    .toast.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .confirm-dialog .modal-body {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .empty-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 12px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 560px) {
      .app-header {
        padding: 12px 14px;
      }

      .app-title {
        font-size: 1rem;
        width: 100%;
      }

      main {
        padding: 14px;
      }

      .fab-add {
        right: 14px;
        bottom: 14px;
        width: 52px;
        min-width: 52px;
        height: 52px;
        padding: 0;
      }

      .fab-add .fab-inner .fab-label {
        display: none;
      }

      .fab-add .fab-inner {
        font-size: 1.6rem;
      }

      .fab-add .fab-inner .fab-plus {
        font-size: inherit;
        margin-top: 0;
      }

      .emoji-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .card-main {
        padding: 12px;
      }

      .card-icon {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">어울림 링크허브</h1>
    <div class="header-actions">
      <button type="button" class="btn" id="btn-edit-toggle">편집</button>
      <button type="button" class="btn btn-primary hidden" id="btn-edit-done">편집 완료</button>
      <button type="button" class="btn" id="btn-batch-edit" disabled>수정</button>
      <button type="button" class="btn btn-danger" id="btn-batch-delete" disabled>삭제</button>
    </div>
  </header>

  <main>
    <h2 class="section-title">고정됨</h2>
    <div id="pinned-list" class="sortable-list" aria-label="고정된 링크"></div>
    <div id="pinned-empty" class="empty-hint hidden">고정된 링크가 없습니다.</div>

    <h2 class="section-title">일반</h2>
    <div id="normal-list" class="sortable-list" aria-label="일반 링크"></div>
    <div id="normal-empty" class="empty-hint hidden">등록된 링크가 없습니다.</div>
  </main>

  <button type="button" class="fab-add" id="fab-add" aria-label="링크 추가">
    <span class="fab-inner"><span class="fab-plus" aria-hidden="true">+</span><span class="fab-label">추가</span></span>
  </button>

  <div class="toast-container" id="toast-container"></div>

  <!-- 추가/수정 모달 -->
  <div class="modal-overlay" id="modal-link" role="dialog" aria-modal="true" aria-labelledby="link-modal-title">
    <div class="modal">
      <div class="modal-header" id="link-modal-title">링크 추가</div>
      <div class="modal-body">
        <div class="field">
          <label for="link-name">이름</label>
          <input type="text" id="link-name" maxlength="120" />
        </div>
        <div class="field">
          <label>아이콘</label>
          <div class="emoji-grid" id="emoji-grid"></div>
        </div>
        <div class="field">
          <label for="link-url">URL</label>
          <input type="url" id="link-url" placeholder="https://example.com" inputmode="url" />
          <p class="hint">https:// 로 시작하는 주소를 입력하세요.</p>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" id="link-cancel">취소</button>
        <button type="button" class="btn btn-primary" id="link-submit">만들기</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 -->
  <div class="modal-overlay confirm-dialog" id="modal-delete" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">삭제 확인</div>
      <div class="modal-body" id="delete-message"></div>
      <div class="modal-footer">
        <button type="button" class="btn" id="delete-cancel">취소</button>
        <button type="button" class="btn btn-danger" id="delete-confirm">삭제</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://eoulrimstudio-upload.eoulrimstudio.workers.dev";
    const SHA_HEADER = "X-GitHub-Content-Sha";

    const EMOJI_OPTIONS = ["🔗", "📁", "📋", "📊", "📦", "🛠️", "📤", "📝", "🗂️", "🖼️", "📌", "🔧"];

    function getDefaultItems() {
      return [
        {
          id: crypto.randomUUID(),
          name: "업로드 관리",
          icon: "📤",
          url: "https://eoulrimstudio-upload.eoulrimstudio.workers.dev/admin",
          pinned: false,
          order: 0,
        },
        {
          id: crypto.randomUUID(),
          name: "작업 기록",
          icon: "📋",
          url: "https://shinhp3.github.io/eoulrimstudio-records/",
          pinned: false,
          order: 1,
        },
      ];
    }

    let linksData = { items: [] };
    let currentSha = "";
    let sortablePinned = null;
    let sortableNormal = null;
    let editMode = false;
    let editingId = null;
    let selectedEmoji = "🔗";

    const el = (id) => document.getElementById(id);

    function toast(message, type = "error") {
      const wrap = el("toast-container");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = message;
      wrap.appendChild(t);
      setTimeout(() => {
        t.remove();
      }, 3200);
    }

    async function refreshShaFromServer() {
      const res = await fetch(`${WORKER_URL}/tools`, { method: "GET" });
      if (!res.ok) return;
      currentSha = res.headers.get(SHA_HEADER) || "";
    }

    async function loadLinksFromStorage() {
      try {
        const res = await fetch(`${WORKER_URL}/tools`, { method: "GET" });
        if (!res.ok) {
          throw new Error(`불러오기 실패 (${res.status})`);
        }
        const parsed = await res.json();
        if (!parsed.items || !Array.isArray(parsed.items)) {
          throw new Error("tools.json 형식이 올바르지 않습니다.");
        }
        currentSha = res.headers.get(SHA_HEADER) || "";
        if (parsed.items.length === 0) {
          linksData = normalizeOrders({ items: getDefaultItems() });
          await persistLinks({ toastSuccess: false });
        } else {
          linksData = normalizeOrders({ items: parsed.items });
        }
      } catch (e) {
        toast(String(e.message || e));
        linksData = normalizeOrders({ items: getDefaultItems() });
        currentSha = "";
      }
    }

    async function persistLinks(options = {}) {
      const { toastSuccess = true, message } = options;
      try {
        const body = { items: linksData.items };
        if (currentSha) body.sha = currentSha;

        const res = await fetch(`${WORKER_URL}/tools`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        let data = {};
        try {
          data = await res.json();
        } catch {
          /* ignore */
        }

        if (!res.ok || data.success === false) {
          toast(data.error || `저장 실패 (${res.status})`);
          return;
        }

        if (toastSuccess) {
          toast(message || "저장했습니다.", "success");
        }
        await refreshShaFromServer();
      } catch (e) {
        toast(String(e.message || e));
      }
    }

    function normalizeOrders(data) {
      const list = data.items || [];
      const pinned = list.filter((l) => l.pinned).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      const normal = list.filter((l) => !l.pinned).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      pinned.forEach((l, i) => {
        l.order = i;
      });
      normal.forEach((l, i) => {
        l.order = i;
      });
      return { items: [...pinned, ...normal] };
    }

    function collectOrdersFromDom() {
      const pinnedIds = [...el("pinned-list").querySelectorAll("[data-id]")].map((n) => n.dataset.id);
      const normalIds = [...el("normal-list").querySelectorAll("[data-id]")].map((n) => n.dataset.id);
      const map = new Map(linksData.items.map((l) => [l.id, { ...l }]));
      pinnedIds.forEach((id, i) => {
        const item = map.get(id);
        if (item) {
          item.pinned = true;
          item.order = i;
        }
      });
      normalIds.forEach((id, i) => {
        const item = map.get(id);
        if (item) {
          item.pinned = false;
          item.order = i;
        }
      });
      linksData.items = normalizeOrders({ items: [...map.values()] }).items;
    }

    function destroySortables() {
      if (sortablePinned) {
        sortablePinned.destroy();
        sortablePinned = null;
      }
      if (sortableNormal) {
        sortableNormal.destroy();
        sortableNormal = null;
      }
    }

    function initSortables() {
      destroySortables();
      const common = {
        animation: 180,
        ghostClass: "sortable-ghost",
        dragClass: "sortable-drag",
        chosenClass: "sortable-chosen",
        delay: 80,
        delayOnTouchOnly: true,
        onEnd: async () => {
          collectOrdersFromDom();
          render();
          await persistLinks({ toastSuccess: false });
        },
      };
      sortablePinned = Sortable.create(el("pinned-list"), {
        ...common,
        disabled: editMode,
      });
      sortableNormal = Sortable.create(el("normal-list"), {
        ...common,
        disabled: editMode,
      });
    }

    function renderCard(link) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = link.id;

      const cbWrap = document.createElement("div");
      cbWrap.className = "card-checkbox-wrap";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = "circle-check";
      cb.dataset.selectId = link.id;
      cb.addEventListener("click", (ev) => ev.stopPropagation());
      cb.addEventListener("change", updateBatchButtons);
      cbWrap.appendChild(cb);

      const main = document.createElement("button");
      main.type = "button";
      main.className = "card-main";
      main.addEventListener("click", () => {
        if (editMode) return;
        window.open(link.url, "_blank", "noopener,noreferrer");
      });

      const icon = document.createElement("span");
      icon.className = "card-icon";
      icon.textContent = link.icon || "🔗";
      icon.setAttribute("aria-hidden", "true");

      const body = document.createElement("div");
      body.className = "card-body";
      const name = document.createElement("div");
      name.className = "card-name";
      name.textContent = link.name;
      body.appendChild(name);

      main.appendChild(icon);
      main.appendChild(body);

      const pinBtn = document.createElement("button");
      pinBtn.type = "button";
      pinBtn.className = "card-pin" + (link.pinned ? " pinned-active" : "");
      pinBtn.setAttribute("aria-label", link.pinned ? "고정 해제" : "고정");
      pinBtn.textContent = "📌";
      pinBtn.addEventListener("click", async (ev) => {
        ev.stopPropagation();
        const target = linksData.items.find((l) => l.id === link.id);
        if (!target) return;
        target.pinned = !target.pinned;
        linksData = normalizeOrders(linksData);
        render();
        await persistLinks({ toastSuccess: true });
      });

      card.appendChild(cbWrap);
      card.appendChild(main);
      card.appendChild(pinBtn);
      return card;
    }

    function render() {
      destroySortables();
      const pinned = linksData.items.filter((l) => l.pinned).sort((a, b) => a.order - b.order);
      const normal = linksData.items.filter((l) => !l.pinned).sort((a, b) => a.order - b.order);

      const pl = el("pinned-list");
      const nl = el("normal-list");
      pl.innerHTML = "";
      nl.innerHTML = "";

      pinned.forEach((l) => pl.appendChild(renderCard(l)));
      normal.forEach((l) => nl.appendChild(renderCard(l)));

      el("pinned-empty").classList.toggle("hidden", pinned.length > 0);
      el("normal-empty").classList.toggle("hidden", normal.length > 0);

      document.querySelectorAll(".circle-check").forEach((cb) => {
        cb.checked = false;
      });

      initSortables();
      updateBatchButtons();
    }

    function openModal(overlay) {
      overlay.classList.add("open");
    }

    function closeModal(overlay) {
      overlay.classList.remove("open");
    }

    function ensureHttps(url) {
      const t = url.trim();
      if (!t) return "";
      if (/^https?:\/\//i.test(t)) return t;
      return "https://" + t.replace(/^\/+/, "");
    }

    function buildEmojiGrid() {
      const grid = el("emoji-grid");
      grid.innerHTML = "";
      EMOJI_OPTIONS.forEach((emo) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "emoji-btn" + (emo === selectedEmoji ? " selected" : "");
        b.textContent = emo;
        b.addEventListener("click", () => {
          selectedEmoji = emo;
          grid.querySelectorAll(".emoji-btn").forEach((x) => x.classList.remove("selected"));
          b.classList.add("selected");
        });
        grid.appendChild(b);
      });
    }

    function openLinkModal(isEdit = false) {
      editingId = isEdit ? getSingleSelectedId() : null;
      el("link-modal-title").textContent = isEdit ? "링크 수정" : "링크 추가";
      el("link-submit").textContent = isEdit ? "저장" : "만들기";

      if (isEdit && editingId) {
        const item = linksData.items.find((l) => l.id === editingId);
        if (item) {
          el("link-name").value = item.name;
          el("link-url").value = item.url;
          selectedEmoji = item.icon || "🔗";
        }
      } else {
        el("link-name").value = "";
        el("link-url").value = "";
        selectedEmoji = "🔗";
      }
      buildEmojiGrid();
      openModal(el("modal-link"));
    }

    function getSelectedIds() {
      return [...document.querySelectorAll(".circle-check:checked")].map((cb) => cb.dataset.selectId);
    }

    function getSingleSelectedId() {
      const ids = getSelectedIds();
      return ids.length === 1 ? ids[0] : null;
    }

    function updateBatchButtons() {
      const ids = getSelectedIds();
      const n = ids.length;
      el("btn-batch-edit").disabled = n !== 1;
      el("btn-batch-delete").disabled = n === 0;
    }

    async function submitLinkForm() {
      const name = el("link-name").value.trim();
      let url = ensureHttps(el("link-url").value);
      if (!name || !url.trim()) {
        toast("이름과 URL을 입력해 주세요.");
        return;
      }
      try {
        new URL(url);
      } catch {
        toast("올바른 URL 형식이 아닙니다.");
        return;
      }

      if (editingId) {
        const item = linksData.items.find((l) => l.id === editingId);
        if (item) {
          item.name = name;
          item.icon = selectedEmoji;
          item.url = url;
        }
        linksData = normalizeOrders(linksData);
        closeModal(el("modal-link"));
        render();
        await persistLinks({ toastSuccess: true });
      } else {
        const newLink = {
          id: crypto.randomUUID(),
          name,
          icon: selectedEmoji,
          url,
          pinned: false,
          order: linksData.items.filter((l) => !l.pinned).length,
        };
        linksData.items.push(newLink);
        linksData = normalizeOrders(linksData);
        closeModal(el("modal-link"));
        render();
        await persistLinks({ toastSuccess: true });
      }
      editingId = null;
    }

    function setEditMode(on) {
      editMode = on;
      document.body.classList.toggle("edit-mode", on);
      el("btn-edit-toggle").classList.toggle("hidden", on);
      el("btn-edit-done").classList.toggle("hidden", !on);
      el("fab-add").classList.toggle("hidden", on);
      document.querySelectorAll(".circle-check").forEach((cb) => {
        cb.checked = false;
      });
      initSortables();
      updateBatchButtons();
    }

    /* 이벤트 바인딩 */
    el("btn-edit-toggle").addEventListener("click", () => setEditMode(true));
    el("btn-edit-done").addEventListener("click", () => setEditMode(false));

    el("fab-add").addEventListener("click", () => openLinkModal(false));

    el("link-cancel").addEventListener("click", () => {
      closeModal(el("modal-link"));
      editingId = null;
    });

    el("link-submit").addEventListener("click", () => submitLinkForm());

    el("btn-batch-edit").addEventListener("click", () => {
      if (getSelectedIds().length !== 1) return;
      openLinkModal(true);
    });

    el("btn-batch-delete").addEventListener("click", () => {
      const ids = getSelectedIds();
      if (ids.length === 0) return;
      el("delete-message").textContent = `선택한 ${ids.length}개 항목을 삭제할까요? 이 작업은 되돌릴 수 없습니다.`;
      openModal(el("modal-delete"));
    });

    el("delete-cancel").addEventListener("click", () => closeModal(el("modal-delete")));

    el("delete-confirm").addEventListener("click", async () => {
      const ids = new Set(getSelectedIds());
      linksData.items = linksData.items.filter((l) => !ids.has(l.id));
      linksData = normalizeOrders(linksData);
      closeModal(el("modal-delete"));
      render();
      await persistLinks({ toastSuccess: true });
      setEditMode(false);
    });

    window.addEventListener("DOMContentLoaded", async () => {
      buildEmojiGrid();
      await loadLinksFromStorage();
      render();
    });
  </script>
</body>
</html>
